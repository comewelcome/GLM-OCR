services:
  # vLLM serves GLM-OCR with OpenAI-compatible API
  glm-ocr:
    image: vllm/vllm-openai:latest
    container_name: glm-ocr
    ports:
      - "${VLLM_PORT:-8080}:8000"
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HUGGING_FACE_HUB_TOKEN:-}
    volumes:
      # Persistent HuggingFace model cache (survives restarts)
      - ./volumes/models:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      --model ${MODEL_ID:-ADSKAILab/Zero-To-CAD-Qwen3-VL-2B}
      --port 8000
      --host 0.0.0.0
      --served-model-name qwen3-vl-2b
      --gpu-memory-utilization ${GPU_MEMORY_UTILIZATION:-0.9}
      --max-model-len ${MAX_MODEL_LEN:-4096}
      --max-num-seqs ${MAX_NUM_SEQS:-4}
      --speculative-config '{"method":"mtp","num_speculative_tokens":3}'
      --dtype bfloat16
      --enforce-eager
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    stop_grace_period: 30s

  # API Gateway: PDF -> images -> OCR, OpenAI-style endpoints
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: glm-ocr-api
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      - VLLM_BASE_URL=http://glm-ocr:8000
      - API_KEY=${API_KEY:-}
      - PDF_DPI=${PDF_DPI:-200}
      - PDF_IMAGE_FORMAT=${PDF_IMAGE_FORMAT:-png}
    volumes:
      # Persistent uploads & output
      - ./volumes/uploads:/app/uploads
      - ./volumes/output:/app/output
    depends_on:
      glm-ocr:
        condition: service_healthy
    restart: unless-stopped
